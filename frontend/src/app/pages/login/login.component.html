<div class="card mx-auto mt-5" style="max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
  <div class="card-header text-center" style="background-color: var(--card-bg); border-bottom: 1px solid var(--border-color);">
    <h4 class="mb-0">Tizimga Kirish</h4>
  </div>
  <div class="card-body">
    @if (errorMsg) {
      <div class="alert alert-danger">{{ errorMsg }}</div>
    }
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" [(ngModel)]="email">
    </div>
    <div class="mb-3">
      <label class="form-label">Parol</label>
      <input type="password" class="form-control" [(ngModel)]="password">
    </div>
    <button class="btn btn-primary w-100 mt-2" (click)="login()">Kirish</button>
  </div>
</div>
